<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ECU_TESTER</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Landscape kiosk dashboard (OPEN_DECISIONS D8). Free-canvas: modules live on a
       fixed design-space #stage that scales to FHD/4K; drag/resize in Edit mode. -->
  <header class="topbar">
    <span class="brand"><b>ECU</b>_TESTER <em>· AL-AYED</em></span>
    <div class="tb-actions">
      <button id="src" class="tb-btn" title="Toggle data source">Live</button>
      <button id="edit" class="tb-btn" title="Edit / lock layout">Edit</button>
      <button id="reset" class="tb-btn" title="Reset layout to default">Reset</button>
      <span id="conn" class="conn conn--sim">simulation</span>
    </div>
  </header>

  <div id="stage-wrap">
    <main id="stage" class="stage"><!-- modules injected by layout.js --></main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
